<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 300px;
  height: 300px;
  background-color: lightgray;
}

.box1 {
  position: absolute;
  top: 0;
  left: 0;
  background-color: red;
  width: 50px;
  height: 50px;
}

.box2 {
  position: absolute;
  top: 0;
  right: 0;
  background-color: blue;
  width: 50px;
  height: 50px;
}

.box3 {
  position: absolute;
  bottom: 0;
  left: 0;
  background-color: green;
  width: 50px;
  height: 50px;
}

.box4 {
  position: absolute;
  bottom: 0;
  right: 0;
  background-color: orange;
  width: 50px;
  height: 50px;
}
</style>
</head>
<body>

<div class="container">
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
  <div class="box4"></div>
</div>

</body>
</html>
