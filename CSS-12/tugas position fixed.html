<!DOCTYPE html>
<html>
<head>
<style>
.top-left {
  position: fixed;
  top: 0;
  left: 0;
  background-color: yellow;
  padding: 10px;
}

.left {
  position: fixed;
  top: 50%;
  left: 0;
  background-color: lightblue;
  padding: 10px;
}

.right {
  position: fixed;
  top: 50%;
  right: 0;
  background-color: lightgreen;
  padding: 10px;
}

.back-to-top {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background-color: black;
  color: white;
  padding: 10px;
  text-decoration: none;
}
</style>
</head>
<body>

<div class="top-left">Kiri Atas</div>
<div class="left">Kiri</div>
<div class="right">Kanan</div>

<a href="#" class="back-to-top">Back to Top</a>

</body>
</html>
