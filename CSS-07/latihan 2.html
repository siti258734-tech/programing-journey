<!DOCTYPE html>
<html>
<head>
    <title>Latihan 2 Layout</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
            color: white;
        }

        .header {
            width: 100%;
            height: 100px;
            background-color: #84bbe0;
            line-height: 100px;
        }

        .content {
            width: 100%;
            height: 300px;
            background-color: #83e3ab;
            line-height: 300px;
        }

        .footer {
            width: 100%;
            height: 80px;
            background-color: #ea9e95;
            line-height: 80px;
        }
    </style>
</head>
<body>

<div class="header">HEADER (100px)</div>
<div class="content">CONTENT (300px)</div>
<div class="footer">FOOTER (80px)</div>

</body>
</html>
