<!DOCTYPE html>
<html>
<head>
    <title>Latihan 1 Width Height</title>
    <style>
        body {
            font-family: Arial;
        }

        .box {
            margin: 20px;
            text-align: center;
            color: white;
            line-height: 150px;
        }

        .box1 {
            width: 200px;
            height: 200px;
            background-color: rgb(146, 146, 241);
            line-height: 200px;
        }

        .box2 {
            width: 50%;
            height: 150px;
            background-color: rgb(186, 248, 186);
        }

        .box3 {
            width: 80vw;
            height: 30vh;
            background-color: rgb(222, 182, 222);
        }
    </style>
</head>
<body>

<div class="box box1">200px x 200px</div>
<div class="box box2">50% x 150px</div>
<div class="box box3">80vw x 30vh</div>

</body>
</html>
