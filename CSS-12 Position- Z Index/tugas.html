<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas CSS z-index</title>
    <style>
        .container {
            position: relative;
            height: 400px;
            margin-top: 50px;
        }

        img {
            width: 200px;
            height: 200px;
            position: absolute; 
            border: 5px solid rgb(247, 202, 223);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .gambar1 {
            z-index: 3;
            top: 0;
            left: 0;
        }
        .gambar2 {
            z-index: 2;
            top: 50px;
            left: 50px;
        }
        .gambar3 {
            z-index: 1;
            top: 100px;
            left: 100px;
        }
    </style>
</head>
<body>

    <h2>TUGAS</h2>
    <p>Perkumpulan para cogan</p>

    <div class="container">
        <img src="download (11).jpg" alt="Choi San" class="gambar1">
        <img src="download (12).jpg" alt="Jeno" class="gambar2">
        <img src="Bye 2025 __ 260109 Mingyu's ig update.jpg" alt="Mingyu" class="gambar3">
    </div>

</body>
</html>
