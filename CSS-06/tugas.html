<!DOCTYPE html>
<html>
<head>
    <title>Tugas Border</title>
    <style>
        p {
            padding: 15px;
            margin: 15px;
            font-family: Arial;
        }

        .solid {
            border: 3px solid black;
            background-color: #f2f2f2;
        }

        .dashed {
            border: 3px dashed purple;
            background-color: #f3e6ff;
        }

        .groove {
            border: 5px groove green;
            background-color: #e6ffe6;
        }

        .ridge {
            border: 5px ridge red;
            background-color: #ffe6e6;
        }
    </style>
</head>
<body>

<p class="solid">Ini adalah border solid.</p>
<p class="dashed">Ini adalah border dashed.</p>
<p class="groove">Ini adalah border groove.</p>
<p class="ridge">Ini adalah border ridge.</p>

</body>
</html>
