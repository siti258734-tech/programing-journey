<!DOCTYPE html>
<html>
<head>
    <title>Latihan 1 Border</title>
    <style>
        .box {
            padding: 15px;
            margin: 15px;
            width: 250px;
        }

        .solid {
            border: 3px solid black;
            background-color: #f8f8f8;
        }

        .double {
            border: 4px double blue;
            background-color: #e6f0ff;
        }

        .groove {
            border: 5px groove green;
            background-color: #e6ffe6;
        }

        .ridge {
            border: 5px ridge red;
            background-color: #ffe6e6;
        }
    </style>
</head>
<body>

<div class="box solid">Border Solid Hitam</div>
<div class="box double">Border Double Biru</div>
<div class="box groove">Border Groove Hijau</div>
<div class="box ridge">Border Ridge Merah</div>

</body>
</html>
